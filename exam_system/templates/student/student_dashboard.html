<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生首页 - 四川农业大学考试系统</title>
    <link rel="stylesheet" href="/static/css/student.css">
    <style>
        /* Dashboard-specific styles */
        .greeting {
            padding: 24px 0 8px;
        }

        .greeting h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a5c1a;
            margin-bottom: 4px;
        }

        .greeting .subtitle {
            font-size: 13px;
            color: #999;
        }

        /* Stats strip */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            opacity: 0;
            transform: translateY(12px);
            animation: stat-enter 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0ms; }
        .stat-card:nth-child(2) { animation-delay: 60ms; }
        .stat-card:nth-child(3) { animation-delay: 120ms; }
        .stat-card:nth-child(4) { animation-delay: 180ms; }

        @keyframes stat-enter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a5c1a;
            line-height: 1.2;
        }

        .stat-card .stat-value.warn { color: #f39c12; }
        .stat-card .stat-value.fail { color: #e74c3c; }

        .stat-card .stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-stat {
            height: 70px;
            border-radius: 12px;
        }

        .skeleton-line {
            height: 14px;
            margin-bottom: 8px;
        }

        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }

        /* Active exam banner */
        .active-exam-banner {
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            border-radius: 14px;
            padding: 18px 20px;
            margin: 16px 0;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .active-exam-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .active-exam-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 92, 26, 0.3);
        }

        .active-exam-banner .banner-text h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .active-exam-banner .banner-text p {
            font-size: 13px;
            opacity: 0.85;
        }

        .active-exam-banner .banner-btn {
            background: rgba(255,255,255,0.2);
            border: 1.5px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .active-exam-banner .banner-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Section card */
        .section-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header h3 .icon {
            font-size: 18px;
        }

        .section-header .count-badge {
            background: #e8f8e8;
            color: #2d8a2d;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Exam list */
        .exam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .exam-item:last-child { margin-bottom: 0; }

        .exam-item:hover {
            background: #e9ecef;
            transform: translateX(4px);
        }

        .exam-item .exam-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .exam-item .exam-meta {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }

        .exam-item .start-btn {
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .exam-item .start-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 138, 45, 0.3);
        }

        /* Record list */
        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .record-item:last-child { margin-bottom: 0; }

        .record-item .record-info .exam-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .record-item .record-info .exam-date {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .record-item .score {
            font-size: 18px;
            font-weight: 700;
            color: #2d8a2d;
        }

        .record-item .score.fail { color: #e74c3c; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 14px;
        }

        .empty-state .hint {
            font-size: 12px;
            color: #bbb;
            margin-top: 4px;
        }

        /* Error with retry */
        .error-state {
            text-align: center;
            padding: 20px;
        }

        .error-state p {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .retry-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover { background: #e0e0e0; }

        /* Responsive */
        @media (max-width: 480px) {
            .stats-strip {
                grid-template-columns: repeat(2, 1fr);
            }

            .greeting h2 { font-size: 20px; }

            .active-exam-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .active-exam-banner .banner-btn {
                align-self: flex-end;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .stat-card {
                opacity: 1;
                transform: none;
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img src="../../static/images/logo.png" alt="四川农业大学">
            <h1>在线考试系统</h1>
        </div>
        <div class="user-info">
            <span class="username" id="username">用户名</span>
            <div class="avatar">👨‍🎓</div>
            <button class="logout-btn" onclick="Auth.logout()">退出</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Greeting -->
        <div class="greeting">
            <h2 id="greetingText">你好</h2>
            <div class="subtitle" id="dateText"></div>
        </div>

        <!-- Stats strip (skeleton → real) -->
        <div class="stats-strip" id="statsStrip">
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
        </div>

        <!-- Active exam banner (hidden until loaded) -->
        <div class="active-exam-banner" id="activeExamBanner" style="display:none;" onclick="resumeExam()">
            <div class="banner-text">
                <h3>📋 你有一场未完成的考试</h3>
                <p id="activeExamName">-</p>
            </div>
            <button class="banner-btn">继续考试 →</button>
        </div>

        <!-- Pending exams -->
        <div class="section-card">
            <div class="section-header">
                <h3><span class="icon">📝</span> 待考试卷</h3>
                <span class="count-badge" id="examCount" style="display:none;">0</span>
            </div>
            <div id="examList">
                <div class="skeleton skeleton-line medium"></div>
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line medium" style="margin-top:12px;"></div>
                <div class="skeleton skeleton-line short"></div>
            </div>
        </div>

        <!-- Recent records -->
        <div class="section-card">
            <div class="section-header">
                <h3><span class="icon">📊</span> 最近成绩</h3>
                <span class="count-badge" id="recordCount" style="display:none;">0</span>
            </div>
            <div id="recordList">
                <div class="skeleton skeleton-line medium"></div>
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line medium" style="margin-top:12px;"></div>
                <div class="skeleton skeleton-line short"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('exam')">
            <span class="icon">📋</span>
            <span>试卷</span>
        </div>
        <div class="nav-item" onclick="showTab('record')">
            <span class="icon">📊</span>
            <span>记录</span>
        </div>
        <div class="nav-item" onclick="showTab('wrong')">
            <span class="icon">📝</span>
            <span>错题</span>
        </div>
    </div>

    <script src="../../static/js/api.js"></script>
    <script>
        const user = Auth.requireAuth();
        if (!user) {
            window.location.href = '/login';
        }

        // Greeting
        const hour = new Date().getHours();
        let greeting = '你好';
        if (hour < 6) greeting = '夜深了';
        else if (hour < 12) greeting = '早上好';
        else if (hour < 14) greeting = '中午好';
        else if (hour < 18) greeting = '下午好';
        else greeting = '晚上好';
        document.getElementById('greetingText').textContent = `${greeting}，${user.username}`;

        const today = new Date();
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        document.getElementById('dateText').textContent =
            `${today.getMonth() + 1}月${today.getDate()}日 星期${weekdays[today.getDay()]}`;

        // Stats
        let allRecords = [];
        let allWrongQuestions = [];
        let activeExamId = null;

        function renderStats() {
            const strip = document.getElementById('statsStrip');
            const total = allRecords.length;
            const avgScore = total > 0
                ? Math.round(allRecords.reduce((sum, r) => sum + (r.record.score / r.record.total_score * 100), 0) / total)
                : 0;
            const passCount = allRecords.filter(r => r.record.score / r.record.total_score >= 0.6).length;
            const passRate = total > 0 ? Math.round(passCount / total * 100) : 0;
            const wrongCount = allWrongQuestions.length;

            const avgClass = avgScore >= 60 ? (avgScore >= 80 ? '' : 'warn') : 'fail';
            const passClass = passRate >= 60 ? (passRate >= 80 ? '' : 'warn') : 'fail';

            strip.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">已考次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${avgClass}">${avgScore}</div>
                    <div class="stat-label">平均分</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${passClass}">${passRate}%</div>
                    <div class="stat-label">及格率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${wrongCount > 0 ? 'warn' : ''}">${wrongCount}</div>
                    <div class="stat-label">错题数</div>
                </div>
            `;
        }

        async function loadStats() {
            try {
                const [recordsRes, wrongRes] = await Promise.all([
                    API.getExamRecords(user.id),
                    API.getWrongQuestions(user.id)
                ]);
                if (recordsRes.code === 200) allRecords = recordsRes.data;
                if (wrongRes.code === 200) allWrongQuestions = wrongRes.data;
                renderStats();
            } catch (err) {
                document.getElementById('statsStrip').innerHTML =
                    '<div class="error-state" style="grid-column: 1/-1;"><p>统计数据加载失败</p><button class="retry-btn" onclick="loadStats()">重试</button></div>';
            }
        }

        // Active exam detection
        async function checkActiveExam() {
            try {
                const result = await API.getExamRecords(user.id);
                if (result.code === 200) {
                    const incomplete = result.data.find(r => !r.record.end_time);
                    if (incomplete) {
                        activeExamId = incomplete.exam_id;
                        document.getElementById('activeExamName').textContent = incomplete.exam_name;
                        document.getElementById('activeExamBanner').style.display = 'flex';
                    }
                }
            } catch (err) {
                // Silently fail — banner is non-critical
            }
        }

        function resumeExam() {
            if (activeExamId) {
                window.location.href = `exam.html?exam_id=${activeExamId}`;
            }
        }

        // Exam list
        async function loadExams() {
            try {
                const result = await API.getExams(user.id);
                const examList = document.getElementById('examList');

                if (result.code === 200 && result.data.length > 0) {
                    document.getElementById('examCount').textContent = result.data.length;
                    document.getElementById('examCount').style.display = 'inline';
                    examList.innerHTML = result.data.map(exam => `
                        <div class="exam-item" onclick="startExam(${exam.id})">
                            <div>
                                <div class="exam-name">${exam.exam_name}</div>
                                <div class="exam-meta">${exam.duration_minutes}分钟 · 总分 ${exam.total_score}</div>
                            </div>
                            <button class="start-btn" onclick="event.stopPropagation(); startExam(${exam.id})">开始考试</button>
                        </div>
                    `).join('');
                } else {
                    examList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无待考试卷</p>
                            <div class="hint">老师发布考试后会在这里显示</div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('examList').innerHTML =
                    '<div class="error-state"><p>加载失败</p><button class="retry-btn" onclick="loadExams()">重试</button></div>';
            }
        }

        // Records
        async function loadRecords() {
            try {
                const result = await API.getExamRecords(user.id);
                const recordList = document.getElementById('recordList');

                if (result.code === 200 && result.data.length > 0) {
                    document.getElementById('recordCount').textContent = result.data.length;
                    document.getElementById('recordCount').style.display = 'inline';
                    // Show last 5
                    const recent = result.data.slice(0, 5);
                    recordList.innerHTML = recent.map(record => {
                        const scoreRate = record.record.score / record.record.total_score;
                        const isPass = scoreRate >= 0.6;
                        return `
                            <div class="record-item">
                                <div class="record-info">
                                    <div class="exam-name">${record.exam_name}</div>
                                    <div class="exam-date">${formatDate(record.record.end_time)}</div>
                                </div>
                                <div class="score ${isPass ? '' : 'fail'}">${record.record.score}/${record.record.total_score}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    recordList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📊</div>
                            <p>暂无考试记录</p>
                            <div class="hint">完成第一场考试后这里会显示你的成绩</div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('recordList').innerHTML =
                    '<div class="error-state"><p>加载失败</p><button class="retry-btn" onclick="loadRecords()">重试</button></div>';
            }
        }

        // Wrong questions (for tab)
        async function loadWrongQuestions() {
            try {
                const result = await API.getWrongQuestions(user.id);
                const recordList = document.getElementById('recordList');

                if (result.code === 200 && result.data.length > 0) {
                    recordList.innerHTML = result.data.map(item => `
                        <div class="wrong-item" onclick="showExplain(${item.question.id})">
                            <div class="question-text">${item.question.question_text}</div>
                            <div class="meta">
                                <span class="knowledge-tag">${item.question.knowledge || '未分类'}</span>
                                <span>难度: ${'⭐'.repeat(item.question.difficulty)}</span>
                            </div>
                            <button class="ai-explain-btn" onclick="event.stopPropagation(); showExplain(${item.question.id})">🤖 AI讲解</button>
                        </div>
                    `).join('');
                } else {
                    recordList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🎉</div>
                            <p>太棒了！暂无错题</p>
                            <div class="hint">继续保持</div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('recordList').innerHTML =
                    '<div class="error-state"><p>加载失败</p><button class="retry-btn" onclick="loadWrongQuestions()">重试</button></div>';
            }
        }

        // Navigation
        async function startExam(examId) {
            try {
                const result = await API.startExam(user.id, examId);
                if (result.code === 200) {
                    window.location.href = `exam.html?exam_id=${examId}&record_id=${result.data.record_id}`;
                } else {
                    alert(result.message || '无法开始考试');
                }
            } catch (err) {
                alert('网络错误，请检查连接');
            }
        }

        function showExplain(questionId) {
            window.location.href = `wrong_explain.html?question_id=${questionId}`;
        }

        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const sectionCards = document.querySelectorAll('.section-card');

            if (tab === 'exam') {
                sectionCards[0].style.display = 'block';
                sectionCards[1].style.display = 'block';
                loadExams();
                loadRecords();
            } else if (tab === 'record') {
                sectionCards[0].style.display = 'none';
                sectionCards[1].style.display = 'block';
                loadRecords();
            } else if (tab === 'wrong') {
                sectionCards[0].style.display = 'none';
                sectionCards[1].style.display = 'block';
                loadWrongQuestions();
            }
        }

        // Init
        loadStats();
        loadExams();
        loadRecords();
        checkActiveExam();
    </script>
</body>
</html>
