<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生首页 - 四川农业大学考试系统</title>
    <link rel="stylesheet" href="/static/css/student.css">
    <style>
        /* Dashboard-specific styles */
        .greeting {
            padding: 24px 0 8px;
        }

        .greeting h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a5c1a;
            margin-bottom: 4px;
        }

        .greeting .subtitle {
            font-size: 13px;
            color: #999;
        }

        /* Stats strip */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 16px 0;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 14px 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            opacity: 0;
            transform: translateY(12px);
            animation: stat-enter 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0ms; }
        .stat-card:nth-child(2) { animation-delay: 60ms; }
        .stat-card:nth-child(3) { animation-delay: 120ms; }
        .stat-card:nth-child(4) { animation-delay: 180ms; }

        @keyframes stat-enter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a5c1a;
            line-height: 1.2;
        }

        .stat-card .stat-value.warn { color: #f39c12; }
        .stat-card .stat-value.fail { color: #e74c3c; }

        .stat-card .stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-stat {
            height: 70px;
            border-radius: 12px;
        }

        .skeleton-line {
            height: 14px;
            margin-bottom: 8px;
        }

        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }

        /* Active exam banner */
        .active-exam-banner {
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            border-radius: 14px;
            padding: 18px 20px;
            margin: 16px 0;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .active-exam-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .active-exam-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 92, 26, 0.3);
        }

        .active-exam-banner .banner-text h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .active-exam-banner .banner-text p {
            font-size: 13px;
            opacity: 0.85;
        }

        .active-exam-banner .banner-btn {
            background: rgba(255,255,255,0.2);
            border: 1.5px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .active-exam-banner .banner-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Section card */
        .section-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header h3 .icon {
            font-size: 18px;
        }

        .section-header .count-badge {
            background: #e8f8e8;
            color: #2d8a2d;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 10px;
        }

        /* Exam list */
        .exam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .exam-item:last-child { margin-bottom: 0; }

        .exam-item:hover {
            background: #e9ecef;
            transform: translateX(4px);
        }

        .exam-item .exam-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .exam-item .exam-meta {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
        }

        .exam-item .start-btn {
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .exam-item .start-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 138, 45, 0.3);
        }

        /* Record list */
        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .record-item:last-child { margin-bottom: 0; }

        .record-item .record-info .exam-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .record-item .record-info .exam-date {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .record-item .score {
            font-size: 18px;
            font-weight: 700;
            color: #2d8a2d;
        }

        .record-item .score.fail { color: #e74c3c; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 14px;
        }

        .empty-state .hint {
            font-size: 12px;
            color: #bbb;
            margin-top: 4px;
        }

        /* Error with retry */
        .error-state {
            text-align: center;
            padding: 20px;
        }

        .error-state p {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .retry-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover { background: #e0e0e0; }

        /* Responsive */
        @media (max-width: 480px) {
            .stats-strip {
                grid-template-columns: repeat(2, 1fr);
            }

            .greeting h2 { font-size: 20px; }

            .active-exam-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .active-exam-banner .banner-btn {
                align-self: flex-end;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .stat-card {
                opacity: 1;
                transform: none;
                animation: none;
            }
        }

        /* Settings / AI Config */
        .form-field {
            margin-bottom: 14px;
        }

        .form-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
        }

        .form-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-field input:focus {
            border-color: #2d8a2d;
            box-shadow: 0 0 0 3px rgba(45, 138, 45, 0.1);
        }

        .field-hint-student {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .form-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .test-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid #2d8a2d;
            background: white;
            color: #2d8a2d;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .test-btn:hover {
            background: #e8f5e9;
        }

        .test-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .save-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            color: white;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:hover {
            box-shadow: 0 4px 12px rgba(45, 138, 45, 0.3);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .config-status-student {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .config-row .cfg-label {
            font-size: 12px;
            color: #999;
            width: 70px;
            flex-shrink: 0;
        }

        .config-row .cfg-value {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.connected {
            background: #e8f5e9;
            color: #27ae60;
        }

        .status-badge.disconnected {
            background: #fdecea;
            color: #e74c3c;
        }

        .test-result-student {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
        }

        .test-result-student.success {
            background: #e8f5e9;
            color: #27ae60;
        }

        .test-result-student.error {
            background: #fdecea;
            color: #e74c3c;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            color: white;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }

        /* Training section */
        .training-difficulty-row {
            display: flex;
            gap: 12px;
        }

        .training-radio {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .training-radio:hover {
            background: #e9ecef;
        }

        .training-radio input[type="radio"] {
            accent-color: #2d8a2d;
        }

        .training-count-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .training-count-row input[type="range"] {
            flex: 1;
            accent-color: #2d8a2d;
            height: 6px;
        }

        .training-count-label {
            font-size: 15px;
            font-weight: 600;
            color: #2d8a2d;
            min-width: 48px;
            text-align: center;
        }

        .training-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .training-history-item:last-child { margin-bottom: 0; }

        .training-history-item .history-info .history-topic {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .training-history-item .history-info .history-meta {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .training-history-item .history-score {
            font-size: 16px;
            font-weight: 700;
            color: #2d8a2d;
        }

        .training-history-item .history-score.fail {
            color: #e74c3c;
        }

        /* Training progress bar */
        .training-progress {
            margin-top: 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .training-progress .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .training-progress .progress-text {
            font-size: 14px;
            font-weight: 500;
            color: #2d8a2d;
        }

        .training-progress .progress-percent {
            font-size: 14px;
            font-weight: 600;
            color: #2d8a2d;
            font-variant-numeric: tabular-nums;
        }

        .training-progress .progress-bar-container {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .training-progress .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1a5c1a, #2d8a2d, #3da33d);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .training-progress .progress-hint {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img src="../../static/images/logo.png" alt="四川农业大学">
            <h1>在线考试系统</h1>
        </div>
        <div class="user-info">
            <span class="username" id="username">用户名</span>
            <div class="avatar">👨‍🎓</div>
            <button class="logout-btn" onclick="Auth.logout()">退出</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Greeting -->
        <div class="greeting">
            <h2 id="greetingText">你好</h2>
            <div class="subtitle" id="dateText"></div>
        </div>

        <!-- Stats strip (skeleton → real) -->
        <div class="stats-strip" id="statsStrip">
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
            <div class="stat-card skeleton skeleton-stat"></div>
        </div>

        <!-- Active exam banner (hidden until loaded) -->
        <div class="active-exam-banner" id="activeExamBanner" style="display:none;" onclick="resumeExam()">
            <div class="banner-text">
                <h3>📋 你有一场未完成的考试</h3>
                <p id="activeExamName">-</p>
            </div>
            <button class="banner-btn">继续考试 →</button>
        </div>

        <!-- Pending exams -->
        <div class="section-card" id="examSection">
            <div class="section-header">
                <h3><span class="icon">📝</span> 待考试卷</h3>
                <span class="count-badge" id="examCount" style="display:none;">0</span>
            </div>
            <div id="examList">
                <div class="skeleton skeleton-line medium"></div>
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line medium" style="margin-top:12px;"></div>
                <div class="skeleton skeleton-line short"></div>
            </div>
        </div>

        <!-- Records -->
        <div class="section-card" id="recordSection">
            <div class="section-header">
                <h3><span class="icon">📊</span> 考试记录</h3>
                <span class="count-badge" id="recordCount" style="display:none;">0</span>
            </div>
            <div id="recordList">
                <div class="skeleton skeleton-line medium"></div>
                <div class="skeleton skeleton-line short"></div>
                <div class="skeleton skeleton-line medium" style="margin-top:12px;"></div>
                <div class="skeleton skeleton-line short"></div>
            </div>
        </div>

        <!-- Settings: AI Config -->
        <div class="section-card" id="settingsSection" style="display:none;">
            <div class="section-header">
                <h3><span class="icon">⚙️</span> AI 后端管理</h3>
            </div>

            <div id="aiConfigStatusStudent" style="margin-bottom:16px;">
                <div class="skeleton skeleton-line medium"></div>
            </div>

            <form id="aiConfigFormStudent">
                <div class="form-field">
                    <label>Provider（服务商）</label>
                    <input type="text" id="stuCfgProvider" placeholder="如：deepseek、openai" required>
                </div>
                <div class="form-field">
                    <label>模型名称</label>
                    <input type="text" id="stuCfgModel" placeholder="如：deepseek-chat" required>
                </div>
                <div class="form-field">
                    <label>Base URL</label>
                    <input type="text" id="stuCfgBaseUrl" placeholder="如：https://api.deepseek.com/v1" required>
                </div>
                <div class="form-field">
                    <label>API Key</label>
                    <input type="password" id="stuCfgApiKey" placeholder="请输入 API Key" required>
                    <div class="field-hint-student" id="stuCfgApiKeyHint"></div>
                </div>
                <div class="form-btn-row">
                    <button type="button" class="test-btn" id="btnTestConnectionStudent">🔗 测试连接</button>
                    <button type="submit" class="save-btn">💾 保存配置</button>
                </div>
            </form>
            <div id="aiConfigResultStudent" style="margin-top:12px;"></div>
        </div>

        <!-- AI Training -->
        <div class="section-card" id="trainingSection" style="display:none;">
            <div class="section-header">
                <h3><span class="icon">🤖</span> AI 自由训练</h3>
            </div>
            <p style="font-size:13px; color:#999; margin-bottom:18px;">自由选择知识点和题数，AI 帮你出题练习，结果仅保存在本地，老师不可见。</p>

            <div class="form-field">
                <label>知识点</label>
                <input type="text" id="trainingKnowledge" placeholder="如：数据结构、计算机网络（留空默认计算机基础）">
            </div>
            <div class="form-field">
                <label>难度</label>
                <div class="training-difficulty-row">
                    <label class="training-radio"><input type="radio" name="trainingDifficulty" value="1"> 简单</label>
                    <label class="training-radio"><input type="radio" name="trainingDifficulty" value="2" checked> 中等</label>
                    <label class="training-radio"><input type="radio" name="trainingDifficulty" value="3"> 困难</label>
                </div>
            </div>
            <div class="form-field">
                <label>题目数量</label>
                <div class="training-count-row">
                    <input type="range" id="trainingCount" min="1" max="10" value="5" oninput="document.getElementById('trainingCountLabel').textContent=this.value+' 道'">
                    <span id="trainingCountLabel" class="training-count-label">5 道</span>
                </div>
            </div>
            <button class="save-btn" id="btnStartTraining" onclick="startTraining()" style="width:100%; margin-top:10px;">🚀 开始出题</button>
            <div id="trainingProgress" class="training-progress" style="display:none;">
                <div class="progress-info">
                    <span class="progress-text">🤖 AI 正在出题...</span>
                    <span class="progress-percent" id="trainingProgressPercent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="trainingProgressFill"></div>
                </div>
                <div class="progress-hint">请稍候，正在为您生成个性化题目</div>
            </div>
            <div id="trainingError" style="margin-top:10px;"></div>

            <!-- Training history -->
            <div style="margin-top:24px;">
                <div class="section-header">
                    <h3><span class="icon">📋</span> 训练历史</h3>
                    <span class="count-badge" id="trainingHistoryCount" style="display:none;">0</span>
                </div>
                <div id="trainingHistoryList"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('exam')">
            <span class="icon">📋</span>
            <span>试卷</span>
        </div>
        <div class="nav-item" onclick="showTab('record')">
            <span class="icon">📊</span>
            <span>记录</span>
        </div>
        <div class="nav-item" onclick="showTab('wrong')">
            <span class="icon">📝</span>
            <span>错题</span>
        </div>
        <div class="nav-item" onclick="showTab('settings')">
            <span class="icon">⚙️</span>
            <span>设置</span>
        </div>
        <div class="nav-item" onclick="showTab('training')">
            <span class="icon">🤖</span>
            <span>AI训练</span>
        </div>
    </div>

    <script src="../../static/js/api.js"></script>
    <script>
        const user = Auth.requireAuth();
        if (!user) {
            window.location.href = '/login';
        }

        // Greeting
        const hour = new Date().getHours();
        let greeting = '你好';
        if (hour < 6) greeting = '夜深了';
        else if (hour < 12) greeting = '早上好';
        else if (hour < 14) greeting = '中午好';
        else if (hour < 18) greeting = '下午好';
        else greeting = '晚上好';
        document.getElementById('greetingText').textContent = `${greeting}，${user.username}`;

        const today = new Date();
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        document.getElementById('dateText').textContent =
            `${today.getMonth() + 1}月${today.getDate()}日 星期${weekdays[today.getDay()]}`;

        // Stats
        let allRecords = [];
        let allWrongQuestions = [];
        let activeExamId = null;

        function renderStats() {
            const strip = document.getElementById('statsStrip');
            const total = allRecords.length;
            const avgScore = total > 0
                ? Math.round(allRecords.reduce((sum, r) => sum + (r.record.score / r.record.total_score * 100), 0) / total)
                : 0;
            const passCount = allRecords.filter(r => r.record.score / r.record.total_score >= 0.6).length;
            const passRate = total > 0 ? Math.round(passCount / total * 100) : 0;
            const wrongCount = allWrongQuestions.length;

            const avgClass = avgScore >= 60 ? (avgScore >= 80 ? '' : 'warn') : 'fail';
            const passClass = passRate >= 60 ? (passRate >= 80 ? '' : 'warn') : 'fail';

            strip.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">已考次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${avgClass}">${avgScore}</div>
                    <div class="stat-label">平均分</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${passClass}">${passRate}%</div>
                    <div class="stat-label">及格率</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value ${wrongCount > 0 ? 'warn' : ''}">${wrongCount}</div>
                    <div class="stat-label">错题数</div>
                </div>
            `;
        }

        async function loadStats() {
            try {
                const [recordsRes, wrongRes] = await Promise.all([
                    API.getExamRecords(user.id),
                    API.getWrongQuestions(user.id)
                ]);
                if (recordsRes.code === 200) allRecords = recordsRes.data;
                if (wrongRes.code === 200) allWrongQuestions = wrongRes.data;
                renderStats();
            } catch (err) {
                document.getElementById('statsStrip').innerHTML =
                    '<div class="error-state" style="grid-column: 1/-1;"><p>统计数据加载失败</p><button class="retry-btn" onclick="loadStats()">重试</button></div>';
            }
        }

        // Active exam detection
        async function checkActiveExam() {
            try {
                const result = await API.getExamRecords(user.id);
                if (result.code === 200) {
                    const incomplete = result.data.find(r => !r.record.end_time);
                    if (incomplete) {
                        activeExamId = incomplete.exam_id;
                        document.getElementById('activeExamName').textContent = incomplete.exam_name;
                        document.getElementById('activeExamBanner').style.display = 'flex';
                    }
                }
            } catch (err) {
                // Silently fail — banner is non-critical
            }
        }

        function resumeExam() {
            if (activeExamId) {
                window.location.href = `exam.html?exam_id=${activeExamId}`;
            }
        }

        // Exam list
        async function loadExams() {
            try {
                const result = await API.getExams(user.id);
                const examList = document.getElementById('examList');

                if (result.code === 200 && result.data.length > 0) {
                    document.getElementById('examCount').textContent = result.data.length;
                    document.getElementById('examCount').style.display = 'inline';
                    examList.innerHTML = result.data.map(exam => `
                        <div class="exam-item" onclick="startExam(${exam.id})">
                            <div>
                                <div class="exam-name">${exam.exam_name}</div>
                                <div class="exam-meta">${exam.duration_minutes}分钟 · 总分 ${exam.total_score}</div>
                            </div>
                            <button class="start-btn" onclick="event.stopPropagation(); startExam(${exam.id})">开始考试</button>
                        </div>
                    `).join('');
                } else {
                    examList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无待考试卷</p>
                            <div class="hint">老师发布考试后会在这里显示</div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('examList').innerHTML =
                    '<div class="error-state"><p>加载失败</p><button class="retry-btn" onclick="loadExams()">重试</button></div>';
            }
        }

        // Records
        async function loadRecords() {
            try {
                const result = await API.getExamRecords(user.id);
                const recordList = document.getElementById('recordList');

                if (result.code === 200 && result.data.length > 0) {
                    document.getElementById('recordCount').textContent = result.data.length;
                    document.getElementById('recordCount').style.display = 'inline';
                    // 显示全部记录
                    recordList.innerHTML = result.data.map(record => {
                        const scoreRate = record.record.score / record.record.total_score;
                        const isPass = scoreRate >= 0.6;
                        return `
                            <div class="record-item">
                                <div class="record-info">
                                    <div class="exam-name">${record.exam_name}</div>
                                    <div class="exam-date">${formatDate(record.record.end_time)}</div>
                                </div>
                                <div class="score ${isPass ? '' : 'fail'}">${record.record.score}/${record.record.total_score}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    recordList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📊</div>
                            <p>暂无考试记录</p>
                            <div class="hint">完成第一场考试后这里会显示你的成绩</div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('recordList').innerHTML =
                    '<div class="error-state"><p>加载失败</p><button class="retry-btn" onclick="loadRecords()">重试</button></div>';
            }
        }

        // Wrong questions (for tab)
        async function loadWrongQuestions() {
            try {
                const result = await API.getWrongQuestions(user.id);
                const recordList = document.getElementById('recordList');

                if (result.code === 200 && result.data.length > 0) {
                    recordList.innerHTML = result.data.map(item => `
                        <div class="wrong-item" onclick="showExplain(${item.question.id})">
                            <div class="question-text">${item.question.question_text}</div>
                            <div class="meta">
                                <span class="knowledge-tag">${item.question.knowledge || '未分类'}</span>
                                <span>难度: ${'⭐'.repeat(item.question.difficulty)}</span>
                            </div>
                            <button class="ai-explain-btn" onclick="event.stopPropagation(); showExplain(${item.question.id})">🤖 AI讲解</button>
                        </div>
                    `).join('');
                } else {
                    recordList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🎉</div>
                            <p>太棒了！暂无错题</p>
                            <div class="hint">继续保持</div>
                        </div>
                    `;
                }
            } catch (err) {
                document.getElementById('recordList').innerHTML =
                    '<div class="error-state"><p>加载失败</p><button class="retry-btn" onclick="loadWrongQuestions()">重试</button></div>';
            }
        }

        // Navigation
        async function startExam(examId) {
            try {
                const result = await API.startExam(user.id, examId);
                if (result.code === 200) {
                    window.location.href = `exam.html?exam_id=${examId}&record_id=${result.data.record_id}`;
                } else {
                    alert(result.message || '无法开始考试');
                }
            } catch (err) {
                alert('网络错误，请检查连接');
            }
        }

        function showExplain(questionId) {
            window.location.href = `wrong_explain.html?question_id=${questionId}`;
        }

        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const examSection = document.getElementById('examSection');
            const recordSection = document.getElementById('recordSection');
            const settingsSection = document.getElementById('settingsSection');
            const trainingSection = document.getElementById('trainingSection');
            const statsStrip = document.getElementById('statsStrip');
            const activeBanner = document.getElementById('activeExamBanner');
            const greeting = document.querySelector('.greeting');
            const sectionTitle = recordSection.querySelector('h3');
            const countBadge = document.getElementById('recordCount');

            // Hide all sections first
            examSection.style.display = 'none';
            recordSection.style.display = 'none';
            settingsSection.style.display = 'none';
            trainingSection.style.display = 'none';

            if (tab === 'exam') {
                statsStrip.style.display = '';
                activeBanner.style.display = activeExamId ? 'flex' : 'none';
                greeting.style.display = '';
                examSection.style.display = 'block';
                loadExams();
            } else if (tab === 'record') {
                statsStrip.style.display = 'none';
                activeBanner.style.display = 'none';
                greeting.style.display = 'none';
                recordSection.style.display = 'block';
                sectionTitle.innerHTML = '<span class="icon">📊</span> 考试记录';
                countBadge.style.display = 'none';
                loadRecords();
            } else if (tab === 'wrong') {
                statsStrip.style.display = 'none';
                activeBanner.style.display = 'none';
                greeting.style.display = 'none';
                recordSection.style.display = 'block';
                sectionTitle.innerHTML = '<span class="icon">📝</span> 错题本';
                countBadge.style.display = 'none';
                loadWrongQuestions();
            } else if (tab === 'settings') {
                statsStrip.style.display = 'none';
                activeBanner.style.display = 'none';
                greeting.style.display = 'none';
                settingsSection.style.display = 'block';
                loadStudentAiConfig();
            } else if (tab === 'training') {
                statsStrip.style.display = 'none';
                activeBanner.style.display = 'none';
                greeting.style.display = 'none';
                trainingSection.style.display = 'block';
                loadTrainingHistory();
            }
        }

        // Toast for student
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // ===== Student AI Config =====
        async function loadStudentAiConfig() {
            const statusEl = document.getElementById('aiConfigStatusStudent');
            try {
                const result = await API.getAiConfigStatus();
                if (result.code === 200) {
                    const d = result.data;
                    if (d.configured) {
                        statusEl.innerHTML = `
                            <div class="config-status-student">
                                <div class="config-row">
                                    <span class="cfg-label">状态</span>
                                    <span class="status-badge connected">● 已连接</span>
                                </div>
                                <div class="config-row">
                                    <span class="cfg-label">服务商</span>
                                    <span class="cfg-value">${d.provider || '-'}</span>
                                </div>
                                <div class="config-row">
                                    <span class="cfg-label">模型</span>
                                    <span class="cfg-value">${d.model || '-'}</span>
                                </div>
                                <div class="config-row">
                                    <span class="cfg-label">Base URL</span>
                                    <span class="cfg-value" style="word-break:break-all;font-size:12px;">${d.base_url || '-'}</span>
                                </div>
                                <div class="config-row">
                                    <span class="cfg-label">API Key</span>
                                    <span class="cfg-value">${d.api_key_preview || '****'}</span>
                                </div>
                            </div>
                        `;
                        // 预填表单
                        document.getElementById('stuCfgProvider').value = d.provider || '';
                        document.getElementById('stuCfgModel').value = d.model || '';
                        document.getElementById('stuCfgBaseUrl').value = d.base_url || '';
                        document.getElementById('stuCfgApiKeyHint').textContent = '已配置，如需更换请输入新的 Key';
                    } else {
                        statusEl.innerHTML = `
                            <div class="config-status-student">
                                <div class="config-row">
                                    <span class="cfg-label">状态</span>
                                    <span class="status-badge disconnected">● 未配置</span>
                                </div>
                                <div class="config-row">
                                    <span class="cfg-label">提示</span>
                                    <span class="cfg-value">请在下方填写 AI 后端配置</span>
                                </div>
                            </div>
                        `;
                    }
                }
            } catch {
                statusEl.innerHTML = '<div class="error-msg">加载失败</div>';
            }
        }

        // Test connection (student)
        document.getElementById('btnTestConnectionStudent').addEventListener('click', async function() {
            const btn = this;
            const apiKey = document.getElementById('stuCfgApiKey').value.trim();
            const baseUrl = document.getElementById('stuCfgBaseUrl').value.trim();
            const model = document.getElementById('stuCfgModel').value.trim();

            if (!apiKey || !baseUrl || !model) {
                showToast('请填写 API Key、Base URL 和模型名', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ 测试中...';
            const resultDiv = document.getElementById('aiConfigResultStudent');
            resultDiv.innerHTML = '';

            try {
                const result = await API.testAiConnection(apiKey, baseUrl, model);
                if (result.code === 200) {
                    resultDiv.innerHTML = '<div class="test-result-student success">✅ 连接成功！</div>';
                } else {
                    resultDiv.innerHTML = `<div class="test-result-student error">❌ ${result.message}</div>`;
                }
            } catch {
                resultDiv.innerHTML = '<div class="test-result-student error">❌ 网络错误</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = '🔗 测试连接';
            }
        });

        // Save config (student)
        document.getElementById('aiConfigFormStudent').addEventListener('submit', async function(e) {
            e.preventDefault();
            const provider = document.getElementById('stuCfgProvider').value.trim();
            const apiKey = document.getElementById('stuCfgApiKey').value.trim();
            const baseUrl = document.getElementById('stuCfgBaseUrl').value.trim();
            const model = document.getElementById('stuCfgModel').value.trim();

            if (!provider || !apiKey || !baseUrl || !model) {
                showToast('所有字段均为必填', 'error');
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ 保存中...';
            const resultDiv = document.getElementById('aiConfigResultStudent');
            resultDiv.innerHTML = '';

            try {
                const result = await API.saveAiConfig(provider, apiKey, baseUrl, model);
                if (result.code === 200) {
                    resultDiv.innerHTML = '<div class="test-result-student success">✅ 连接成功，配置已保存！</div>';
                    showToast('AI 配置保存成功');
                    loadStudentAiConfig();
                } else {
                    resultDiv.innerHTML = `<div class="test-result-student error">❌ ${result.message}</div>`;
                }
            } catch {
                resultDiv.innerHTML = '<div class="test-result-student error">❌ 网络错误</div>';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 保存配置';
            }
        });

        // ===== AI Training =====
        let trainingProgressInterval = null;

        function startTrainingProgress() {
            const progressDiv = document.getElementById('trainingProgress');
            const progressFill = document.getElementById('trainingProgressFill');
            const progressPercent = document.getElementById('trainingProgressPercent');
            const btn = document.getElementById('btnStartTraining');

            progressDiv.style.display = 'block';
            btn.disabled = true;
            btn.textContent = '⏳ AI 出题中...';

            let progress = 0;
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';

            // Simulate progress: slow start, then gradual increase
            trainingProgressInterval = setInterval(() => {
                if (progress < 90) {
                    // Slower at start, faster in middle
                    const increment = progress < 30 ? 2 : (progress < 60 ? 3 : 4);
                    progress = Math.min(progress + increment, 90);
                    progressFill.style.width = progress + '%';
                    progressPercent.textContent = progress + '%';
                }
            }, 200);
        }

        function completeTrainingProgress(success = true) {
            const progressFill = document.getElementById('trainingProgressFill');
            const progressPercent = document.getElementById('trainingProgressPercent');

            if (trainingProgressInterval) {
                clearInterval(trainingProgressInterval);
                trainingProgressInterval = null;
            }

            if (success) {
                // Quickly jump to 100%
                progressFill.style.width = '100%';
                progressPercent.textContent = '100%';
            }
        }

        function resetTrainingUI() {
            const progressDiv = document.getElementById('trainingProgress');
            const btn = document.getElementById('btnStartTraining');

            if (trainingProgressInterval) {
                clearInterval(trainingProgressInterval);
                trainingProgressInterval = null;
            }

            progressDiv.style.display = 'none';
            btn.disabled = false;
            btn.textContent = '🚀 开始出题';
        }

        async function startTraining() {
            const knowledge = document.getElementById('trainingKnowledge').value.trim();
            const difficultyEl = document.querySelector('input[name="trainingDifficulty"]:checked');
            const difficulty = difficultyEl ? parseInt(difficultyEl.value) : 2;
            const count = parseInt(document.getElementById('trainingCount').value);
            const errorDiv = document.getElementById('trainingError');

            errorDiv.innerHTML = '';
            startTrainingProgress();

            try {
                const result = await API.aiTrainingGenerate(knowledge, difficulty, count);
                if (result.code === 200) {
                    completeTrainingProgress(true);
                    // Save questions to localStorage
                    const trainingData = {
                        questions: result.data.questions,
                        knowledge: result.data.knowledge,
                        difficulty: result.data.difficulty,
                        count: result.data.count,
                        timestamp: Date.now()
                    };
                    localStorage.setItem('ai_training_questions', JSON.stringify(trainingData));
                    // Brief delay for visual feedback before navigation
                    setTimeout(() => {
                        window.location.href = '/student/training_exam.html';
                    }, 300);
                } else {
                    completeTrainingProgress(false);
                    resetTrainingUI();
                    errorDiv.innerHTML = `<div class="test-result-student error">❌ ${result.message}</div>`;
                }
            } catch (err) {
                completeTrainingProgress(false);
                resetTrainingUI();
                errorDiv.innerHTML = '<div class="test-result-student error">❌ 网络错误，请检查连接</div>';
            }
        }

        function loadTrainingHistory() {
            try {
                const history = JSON.parse(localStorage.getItem('ai_training_history') || '[]');
                const listEl = document.getElementById('trainingHistoryList');
                const countEl = document.getElementById('trainingHistoryCount');

                if (history.length > 0) {
                    countEl.textContent = history.length;
                    countEl.style.display = 'inline';
                    listEl.innerHTML = history.slice(0, 10).map(item => {
                        const isPass = item.total > 0 && (item.score / item.total) >= 0.6;
                        const diffText = {1: '简单', 2: '中等', 3: '困难'}[item.difficulty] || '中等';
                        const date = new Date(item.timestamp);
                        const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                        return `
                            <div class="training-history-item">
                                <div class="history-info">
                                    <div class="history-topic">${item.knowledge || '计算机基础'}</div>
                                    <div class="history-meta">${diffText} · ${item.total}题 · ${dateStr}</div>
                                </div>
                                <div class="history-score ${isPass ? '' : 'fail'}">${item.score}/${item.total}</div>
                            </div>
                        `;
                    }).join('');
                } else {
                    countEl.style.display = 'none';
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>暂无训练记录</p>
                            <div class="hint">开始第一次 AI 训练吧</div>
                        </div>
                    `;
                }
            } catch (e) {
                // Ignore
            }
        }

        // Init
        loadStats();
        loadExams();
        checkActiveExam();

        // 默认隐藏记录区域
        document.getElementById('recordSection').style.display = 'none';
    </script>
</body>
</html>
