<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>考试成绩 - 四川农业大学考试系统</title>
    <link rel="stylesheet" href="/static/css/student.css">
    <style>
        .result-card {
            text-align: center;
            padding: 40px 20px;
        }

        /* Score circle with animation */
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            position: relative;
            transform: scale(0);
            animation: circle-enter 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        }

        .score-circle.fail-circle {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
        }

        @keyframes circle-enter {
            0% { transform: scale(0) rotate(-10deg); }
            60% { transform: scale(1.08) rotate(2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .score-circle .score {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }

        .score-circle .total {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Ring animation around circle */
        .score-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(255,255,255,0.4);
            animation: ring-spin 1.2s ease-out 0.4s forwards;
            opacity: 0;
        }

        @keyframes ring-spin {
            0% { opacity: 1; transform: rotate(0deg); }
            100% { opacity: 0; transform: rotate(720deg); }
        }

        /* Result status */
        .result-status {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(10px);
            animation: fade-up 0.4s ease-out 0.6s forwards;
        }

        @keyframes fade-up {
            to { opacity: 1; transform: translateY(0); }
        }

        .result-status.pass { color: #2d8a2d; }
        .result-status.fail { color: #e74c3c; }

        /* Stats */
        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(10px);
            animation: fade-up 0.4s ease-out 0.8s forwards;
        }

        .stat-item { text-align: center; }

        .stat-item .number {
            font-size: 28px;
            font-weight: 600;
            color: #2d8a2d;
        }

        .stat-item .number.wrong-num { color: #e74c3c; }

        .stat-item .label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        /* AI summary */
        .ai-summary {
            background: #e8f8e8;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
            opacity: 0;
            transform: translateY(10px);
            animation: fade-up 0.4s ease-out 1s forwards;
        }

        .ai-summary h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #1a5c1a;
        }

        .ai-summary p {
            font-size: 14px;
            line-height: 1.8;
            color: #666;
            white-space: pre-wrap;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            opacity: 0;
            transform: translateY(10px);
            animation: fade-up 0.4s ease-out 1.1s forwards;
        }

        .btn-group .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
        }

        .btn-group .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 16px rgba(45, 138, 45, 0.3);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        /* Confetti */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            opacity: 0;
            animation: confetti-fall var(--fall-duration, 2s) ease-out var(--fall-delay, 0s) forwards;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(var(--fall-rotation, 720deg)) scale(0.5);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .score-circle,
            .result-status,
            .result-stats,
            .ai-summary,
            .btn-group {
                animation: none;
                opacity: 1;
                transform: none;
            }
            .score-ring { display: none; }
            .confetti-container { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img src="../../static/images/logo.png" alt="四川农业大学">
            <h1>考试成绩</h1>
        </div>
    </div>

    <div class="main-content">
        <div class="card result-card">
            <div class="score-circle" id="scoreCircle">
                <div class="score-ring"></div>
                <div class="score" id="score">0</div>
                <div class="total">总分 <span id="total">100</span></div>
            </div>

            <div class="result-status" id="status">合格</div>

            <div class="result-stats">
                <div class="stat-item">
                    <div class="number" id="correctCount">0</div>
                    <div class="label">答对</div>
                </div>
                <div class="stat-item">
                    <div class="number wrong-num" id="wrongCount">0</div>
                    <div class="label">答错</div>
                </div>
            </div>

            <div class="ai-summary" id="aiSummary" style="display: none;">
                <h3>🤖 AI 考试分析</h3>
                <p id="summaryContent">加载中...</p>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goBack()">返回首页</button>
                <button class="btn btn-primary" onclick="viewWrong()">查看错题</button>
            </div>
        </div>
    </div>

    <!-- Confetti container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script src="../../static/js/api.js"></script>
    <script>
        const user = Auth.requireAuth();
        if (!user) {
            window.location.href = '/login';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const recordId = urlParams.get('record_id');
        const targetScore = parseInt(urlParams.get('score') || 0);
        const total = parseInt(urlParams.get('total') || 100);

        document.getElementById('total').textContent = total;

        // Score count-up animation
        function animateScore(target, duration) {
            const scoreEl = document.getElementById('score');
            const start = 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Ease-out-quart
                const eased = 1 - Math.pow(1 - progress, 4);
                const current = Math.round(start + (target - start) * eased);

                scoreEl.textContent = current;

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        // Trigger score animation after circle enters
        setTimeout(() => {
            animateScore(targetScore, 800);
        }, 500);

        // Pass/fail status
        const passScore = total * 0.6;
        const statusEl = document.getElementById('status');
        const scoreCircle = document.getElementById('scoreCircle');

        if (targetScore >= passScore) {
            statusEl.textContent = '恭喜！考试合格 🎉';
            statusEl.className = 'result-status pass';
            // Confetti!
            setTimeout(() => launchConfetti(), 700);
        } else {
            statusEl.textContent = '很遗憾，未通过';
            statusEl.className = 'result-status fail';
            scoreCircle.classList.add('fail-circle');
        }

        // Correct/wrong counts
        const wrongCount = Math.round((total - targetScore) / 2);
        const correctCount = Math.round(targetScore / 2);
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('wrongCount').textContent = wrongCount;

        // Confetti generator
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#2d8a2d', '#3da33d', '#27ae60', '#f39c12', '#f1c40f', '#e74c3c', '#3498db'];
            const count = 40;

            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.width = (Math.random() * 6 + 4) + 'px';
                piece.style.height = (Math.random() * 6 + 4) + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.setProperty('--fall-duration', (Math.random() * 1.5 + 1.5) + 's');
                piece.style.setProperty('--fall-delay', (Math.random() * 0.5) + 's');
                piece.style.setProperty('--fall-rotation', (Math.random() * 720 + 360) + 'deg');
                container.appendChild(piece);
            }

            // Clean up after animation
            setTimeout(() => {
                container.innerHTML = '';
            }, 3500);
        }

        // AI summary
        async function loadAiSummary() {
            try {
                const result = await API.aiSummary(recordId);
                if (result.code === 200) {
                    document.getElementById('aiSummary').style.display = 'block';
                    document.getElementById('summaryContent').textContent = result.data.summary;
                }
            } catch (err) {
                // Silent fail — AI summary is non-critical
            }
        }

        function goBack() {
            window.location.href = '/student/student_dashboard.html';
        }

        function viewWrong() {
            // Navigate to wrong questions tab on dashboard
            window.location.href = '/student/student_dashboard.html';
        }

        loadAiSummary();
    </script>
</body>
</html>
