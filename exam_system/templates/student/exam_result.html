<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>考试成绩 - 四川农业大学考试系统</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .result-card {
            text-align: center;
            padding: 40px 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
        }

        .score-circle .score {
            font-size: 48px;
            font-weight: 700;
        }

        .score-circle .total {
            font-size: 18px;
            opacity: 0.8;
        }

        .result-status {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .result-status.pass {
            color: #2d8a2d;
        }

        .result-status.fail {
            color: #e74c3c;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .number {
            font-size: 28px;
            font-weight: 600;
            color: #2d8a2d;
        }

        .stat-item .label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .ai-summary {
            background: #e8f8e8;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .ai-summary h3 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #1a5c1a;
        }

        .ai-summary p {
            font-size: 14px;
            line-height: 1.8;
            color: #666;
            white-space: pre-wrap;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-group .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a5c1a 0%, #2d8a2d 100%);
            color: white;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img src="../../static/images/logo.png" alt="四川农业大学">
            <h1>考试成绩</h1>
        </div>
    </div>

    <div class="main-content">
        <div class="card result-card">
            <div class="score-circle">
                <div class="score" id="score">0</div>
                <div class="total">总分 <span id="total">100</span></div>
            </div>

            <div class="result-status" id="status">合格</div>

            <div class="result-stats">
                <div class="stat-item">
                    <div class="number" id="correctCount">0</div>
                    <div class="label">答对</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="wrongCount">0</div>
                    <div class="label">答错</div>
                </div>
            </div>

            <div class="ai-summary" id="aiSummary" style="display: none;">
                <h3>🤖 AI 考试分析</h3>
                <p id="summaryContent">加载中...</p>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goBack()">返回首页</button>
                <button class="btn btn-primary" onclick="viewWrong()">查看错题</button>
            </div>
        </div>
    </div>

    <script src="../../static/js/api.js"></script>
    <script>
        const user = Auth.requireAuth();
        if (!user) {
            window.location.href = '../login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const recordId = urlParams.get('record_id');
        const score = parseInt(urlParams.get('score') || 0);
        const total = parseInt(urlParams.get('total') || 100);

        document.getElementById('score').textContent = score;
        document.getElementById('total').textContent = total;

        const passScore = total * 0.6;
        const statusEl = document.getElementById('status');
        if (score >= passScore) {
            statusEl.textContent = '恭喜！考试合格';
            statusEl.className = 'result-status pass';
        } else {
            statusEl.textContent = '很遗憾，未通过';
            statusEl.className = 'result-status fail';
        }

        const wrongCount = Math.round((total - score) / 2);
        const correctCount = Math.round(score / 2);
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('wrongCount').textContent = wrongCount;

        async function loadAiSummary() {
            try {
                const result = await API.aiSummary(recordId);
                if (result.code === 200) {
                    document.getElementById('aiSummary').style.display = 'block';
                    document.getElementById('summaryContent').textContent = result.data.summary;
                }
            } catch (err) {
                console.log('AI总结加载失败');
            }
        }

        function goBack() {
            window.location.href = 'student_dashboard.html';
        }

        function viewWrong() {
            window.location.href = 'student_dashboard.html#wrong';
        }

        loadAiSummary();
    </script>
</body>
</html>
