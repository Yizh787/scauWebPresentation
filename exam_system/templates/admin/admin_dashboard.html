<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 四川农业大学考试系统</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <img src="/static/images/logo.png" alt="四川农业大学">
            <h1>管理后台</h1>
        </div>
        <div class="user-info">
            <span class="username" id="username">管理员</span>
            <div class="avatar">👨‍🏫</div>
            <button class="logout-btn" onclick="Auth.logout()">退出</button>
        </div>
    </div>

    <div class="admin-layout">
        <nav class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">概览</div>
                <button class="nav-item active" data-panel="overview">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">数据概览</span>
                </button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">管理</div>
                <button class="nav-item" data-panel="questions">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">题库管理</span>
                </button>
                <button class="nav-item" data-panel="exams">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">考试管理</span>
                </button>
                <button class="nav-item" data-panel="students">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">学生管理</span>
                </button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">工具</div>
                <button class="nav-item" data-panel="ai">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-text">AI 出题</span>
                </button>
            </div>
        </nav>

        <main class="content">
            <!-- AI Status Banner -->
            <div class="ai-banner" id="aiStatus">
                <div class="ai-dot inactive"></div>
                <span>AI 功能未配置</span>
            </div>

            <!-- Overview Panel -->
            <div class="panel active" id="panel-overview">
                <div class="panel-header">
                    <h2>数据概览</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📝</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-questions">-</div>
                            <div class="stat-label">题库总数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-exams">-</div>
                            <div class="stat-label">考试场次</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-students">-</div>
                            <div class="stat-label">学生人数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🤖</div>
                        <div class="stat-info">
                            <div class="stat-value" id="stat-ai">-</div>
                            <div class="stat-label">AI 生成题目</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>难度分布</h3>
                    </div>
                    <div class="difficulty-bars" id="difficultyChart">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>最近考试</h3>
                        <button class="btn btn-ghost" onclick="switchPanel('exams')">查看全部 →</button>
                    </div>
                    <div id="recentExams">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Questions Panel -->
            <div class="panel" id="panel-questions">
                <div class="panel-header">
                    <h2>题库管理</h2>
                    <button class="btn btn-primary" onclick="showAddQuestion()">+ 添加题目</button>
                </div>

                <div class="card" id="addQuestionCard" style="display: none;">
                    <div class="card-header">
                        <h3>添加新题目</h3>
                        <button class="btn btn-ghost" onclick="hideAddQuestion()">取消</button>
                    </div>
                    <form id="questionForm" class="form-grid">
                        <div class="form-group full-width">
                            <label>题目内容</label>
                            <textarea id="qText" placeholder="请输入题目内容" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>选项 A</label>
                            <input type="text" id="qA" placeholder="请输入A选项" required>
                        </div>
                        <div class="form-group">
                            <label>选项 B</label>
                            <input type="text" id="qB" placeholder="请输入B选项" required>
                        </div>
                        <div class="form-group">
                            <label>选项 C</label>
                            <input type="text" id="qC" placeholder="请输入C选项" required>
                        </div>
                        <div class="form-group">
                            <label>选项 D</label>
                            <input type="text" id="qD" placeholder="请输入D选项" required>
                        </div>
                        <div class="form-group">
                            <label>正确答案</label>
                            <select id="qAnswer" required>
                                <option value="">请选择</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>知识点</label>
                            <input type="text" id="qKnowledge" placeholder="如：Python循环">
                        </div>
                        <div class="form-group">
                            <label>难度</label>
                            <select id="qDifficulty">
                                <option value="1">简单</option>
                                <option value="2">中等</option>
                                <option value="3">困难</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>分值</label>
                            <input type="number" id="qScore" value="2" min="1" max="10">
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="hideAddQuestion()">取消</button>
                            <button type="submit" class="btn btn-primary">保存题目</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <div class="search-bar">
                        <input type="text" id="questionSearch" placeholder="搜索题目..." oninput="filterQuestions()">
                        <select id="difficultyFilter" onchange="filterQuestions()">
                            <option value="">全部难度</option>
                            <option value="1">简单</option>
                            <option value="2">中等</option>
                            <option value="3">困难</option>
                        </select>
                    </div>
                    <div class="table-container" id="questionTable">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Exams Panel -->
            <div class="panel" id="panel-exams">
                <div class="panel-header">
                    <h2>考试管理</h2>
                    <button class="btn btn-primary" onclick="showCreateExam()">+ 创建考试</button>
                </div>

                <div class="card" id="createExamCard" style="display: none;">
                    <div class="card-header">
                        <h3>创建新考试</h3>
                        <button class="btn btn-ghost" onclick="hideCreateExam()">取消</button>
                    </div>
                    <form id="examForm" class="form-grid">
                        <div class="form-group">
                            <label>考试名称</label>
                            <input type="text" id="eName" placeholder="如：Python单元测试" required>
                        </div>
                        <div class="form-group">
                            <label>时长（分钟）</label>
                            <input type="number" id="eDuration" value="60" min="10" max="180">
                        </div>
                        <div class="form-group full-width">
                            <label class="checkbox-label">
                                <input type="checkbox" id="eShuffle">
                                <span>开启防作弊乱序（题目和选项随机打乱）</span>
                            </label>
                        </div>
                        <div class="form-group full-width">
                            <label>选择题目</label>
                            <div class="question-selector" id="questionSelectList">
                                <div class="loading">加载中...</div>
                            </div>
                            <div class="selector-info">
                                已选: <strong id="selectedCount">0</strong> 题，总分: <strong id="selectedScore">0</strong> 分
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="hideCreateExam()">取消</button>
                            <button type="submit" class="btn btn-primary">创建考试</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <div id="examManageContent">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- Students Panel -->
            <div class="panel" id="panel-students">
                <div class="panel-header">
                    <h2>学生管理</h2>
                </div>
                <div class="card">
                    <div class="search-bar">
                        <input type="text" id="studentSearch" placeholder="搜索学生..." oninput="filterStudents()">
                    </div>
                    <div id="studentList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>

            <!-- AI Panel -->
            <div class="panel" id="panel-ai">
                <div class="panel-header">
                    <h2>AI 智能出题</h2>
                </div>

                <div class="card">
                    <form id="aiForm" class="form-grid">
                        <div class="form-group">
                            <label>知识点</label>
                            <input type="text" id="aiKnowledge" placeholder="如：Python基础、JavaScript入门">
                        </div>
                        <div class="form-group">
                            <label>难度</label>
                            <select id="aiDifficulty">
                                <option value="1">简单</option>
                                <option value="2">中等</option>
                                <option value="3">困难</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>生成数量</label>
                            <input type="number" id="aiCount" value="5" min="1" max="10">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">开始生成</button>
                        </div>
                    </form>
                </div>

                <div class="card" id="aiResult" style="display: none;">
                    <div class="card-header">
                        <h3>生成结果</h3>
                    </div>
                    <div id="aiResultContent"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Question Detail Modal -->
    <div class="modal" id="questionDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="detailTitle">题目详情</h3>
                <button class="modal-close" onclick="closeModal('questionDetail')">×</button>
            </div>
            <form id="questionEditForm" class="form-grid">
                <input type="hidden" id="editQuestionId">
                <div class="form-group full-width">
                    <label>题目内容</label>
                    <textarea id="editText" placeholder="请输入题目内容" required></textarea>
                </div>
                <div class="form-group full-width">
                    <label>选项预览</label>
                    <div id="editOptionsPreview" class="options-preview"></div>
                </div>
                <div class="form-group">
                    <label>选项 A</label>
                    <input type="text" id="editA" required>
                </div>
                <div class="form-group">
                    <label>选项 B</label>
                    <input type="text" id="editB" required>
                </div>
                <div class="form-group">
                    <label>选项 C</label>
                    <input type="text" id="editC" required>
                </div>
                <div class="form-group">
                    <label>选项 D</label>
                    <input type="text" id="editD" required>
                </div>
                <div class="form-group">
                    <label>正确答案</label>
                    <select id="editAnswer" required>
                        <option value="">请选择</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>知识点</label>
                    <input type="text" id="editKnowledge">
                </div>
                <div class="form-group">
                    <label>难度</label>
                    <select id="editDifficulty">
                        <option value="1">简单</option>
                        <option value="2">中等</option>
                        <option value="3">困难</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>分值</label>
                    <input type="number" id="editScore" min="1" max="10">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('questionDetail')">取消</button>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Exam Questions Modal -->
    <div class="modal" id="examQuestionsModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="examQuestionsTitle">考试题目</h3>
                <button class="modal-close" onclick="closeModal('examQuestions')">×</button>
            </div>
            <div class="modal-body" id="examQuestionsContent">
                <div class="loading">加载中...</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('examQuestions')">关闭</button>
            </div>
        </div>
    </div>

    <!-- Student Records Modal -->
    <div class="modal" id="studentRecordsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="studentRecordsTitle">考试记录</h3>
                <button class="modal-close" onclick="closeModal('studentRecords')">×</button>
            </div>
            <div class="modal-body" id="studentRecordsContent">
                <div class="loading">加载中...</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('studentRecords')">关闭</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        const user = Auth.requireAuth();
        if (!user) window.location.href = '/login';
        if (user.role !== 1) {
            alert('无权限访问');
            window.location.href = '/student/student_dashboard.html';
        }

        document.getElementById('username').textContent = user.username;

        // State
        let allQuestions = [];
        let selectedQuestions = [];

        // Navigation
        function switchPanel(name) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.panel === name);
            });
            document.querySelectorAll('.panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === `panel-${name}`);
            });

            // Load data on panel switch
            if (name === 'questions') loadQuestions();
            if (name === 'exams') loadExams();
            if (name === 'students') loadStudents();
        }

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchPanel(item.dataset.panel));
        });

        // Modal helpers
        function openModal(id) {
            document.getElementById(id).classList.add('show');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        // Close modal on backdrop click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('show');
            });
        });

        // AI Status
        async function checkAiStatus() {
            try {
                const result = await API.getAiConfigStatus();
                const statusEl = document.getElementById('aiStatus');
                if (result.code === 200 && result.data.configured) {
                    statusEl.innerHTML = `<div class="ai-dot active"></div><span>AI 已配置 (${result.data.model})</span>`;
                    document.getElementById('stat-ai').textContent = '可用';
                } else {
                    document.getElementById('stat-ai').textContent = '未配置';
                }
            } catch {
                document.getElementById('stat-ai').textContent = '错误';
            }
        }

        // Load overview stats
        async function loadOverview() {
            try {
                const [questionsRes, examsRes, studentsRes] = await Promise.all([
                    API.getQuestions(1, 1000),
                    API.getExamsManage(),
                    API.getStudents()
                ]);

                if (questionsRes.code === 200) {
                    const questions = questionsRes.data.questions;
                    allQuestions = questions;
                    document.getElementById('stat-questions').textContent = questions.length;

                    // Difficulty chart
                    const byDiff = {1: 0, 2: 0, 3: 0};
                    questions.forEach(q => byDiff[q.difficulty]++);
                    const max = Math.max(...Object.values(byDiff), 1);

                    document.getElementById('difficultyChart').innerHTML = `
                        <div class="diff-bar">
                            <span class="diff-label">简单</span>
                            <div class="diff-track"><div class="diff-fill easy" style="width: ${byDiff[1]/max*100}%"></div></div>
                            <span class="diff-count">${byDiff[1]}</span>
                        </div>
                        <div class="diff-bar">
                            <span class="diff-label">中等</span>
                            <div class="diff-track"><div class="diff-fill medium" style="width: ${byDiff[2]/max*100}%"></div></div>
                            <span class="diff-count">${byDiff[2]}</span>
                        </div>
                        <div class="diff-bar">
                            <span class="diff-label">困难</span>
                            <div class="diff-track"><div class="diff-fill hard" style="width: ${byDiff[3]/max*100}%"></div></div>
                            <span class="diff-count">${byDiff[3]}</span>
                        </div>
                    `;
                }

                if (examsRes.code === 200) {
                    document.getElementById('stat-exams').textContent = examsRes.data.length;

                    // Recent exams
                    const recent = examsRes.data.slice(0, 3);
                    if (recent.length === 0) {
                        document.getElementById('recentExams').innerHTML = '<div class="empty-state">暂无考试</div>';
                    } else {
                        document.getElementById('recentExams').innerHTML = recent.map(item => {
                            const e = item.exam;
                            return `
                                <div class="recent-item">
                                    <div class="recent-info">
                                        <div class="recent-name">${e.exam_name}</div>
                                        <div class="recent-meta">${item.question_count} 题 · ${e.duration_minutes} 分钟</div>
                                    </div>
                                    <div class="recent-participants">${item.completed_count} 人完成</div>
                                </div>
                            `;
                        }).join('');
                    }
                }

                if (studentsRes.code === 200) {
                    document.getElementById('stat-students').textContent = studentsRes.data.length;
                }
            } catch (err) {
                console.error('Failed to load overview:', err);
            }
        }

        // Questions
        async function loadQuestions() {
            try {
                const result = await API.getQuestions(1, 1000);
                if (result.code === 200) {
                    allQuestions = result.data.questions;
                    renderQuestions(allQuestions);
                }
            } catch {
                document.getElementById('questionTable').innerHTML = '<div class="error-msg">加载失败</div>';
            }
        }

        function renderQuestions(questions) {
            const diffLabels = {1: '简单', 2: '中等', 3: '困难'};
            const diffClasses = {1: 'easy', 2: 'medium', 3: 'hard'};

            if (questions.length === 0) {
                document.getElementById('questionTable').innerHTML = '<div class="empty-state">暂无题目，点击上方按钮添加</div>';
                return;
            }

            document.getElementById('questionTable').innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>题目</th>
                            <th>知识点</th>
                            <th>难度</th>
                            <th>分值</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${questions.map(q => `
                            <tr>
                                <td class="col-id">${q.id}</td>
                                <td class="col-text">${truncate(q.question_text, 40)}</td>
                                <td class="col-tag">${q.knowledge || '-'}</td>
                                <td><span class="badge ${diffClasses[q.difficulty]}">${diffLabels[q.difficulty]}</span></td>
                                <td class="col-score">${q.score}</td>
                                <td class="col-actions">
                                    <button class="btn btn-sm btn-ghost" onclick="viewQuestion(${q.id})">编辑</button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteQuestion(${q.id})">删除</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function filterQuestions() {
            const search = document.getElementById('questionSearch').value.toLowerCase();
            const diff = document.getElementById('difficultyFilter').value;

            let filtered = allQuestions;
            if (search) {
                filtered = filtered.filter(q =>
                    q.question_text.toLowerCase().includes(search) ||
                    (q.knowledge && q.knowledge.toLowerCase().includes(search))
                );
            }
            if (diff) {
                filtered = filtered.filter(q => q.difficulty === parseInt(diff));
            }
            renderQuestions(filtered);
        }

        function showAddQuestion() {
            document.getElementById('addQuestionCard').style.display = 'block';
            document.getElementById('qText').focus();
        }

        function hideAddQuestion() {
            document.getElementById('addQuestionCard').style.display = 'none';
            document.getElementById('questionForm').reset();
        }

        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                question_text: document.getElementById('qText').value,
                option_a: document.getElementById('qA').value,
                option_b: document.getElementById('qB').value,
                option_c: document.getElementById('qC').value,
                option_d: document.getElementById('qD').value,
                answer: document.getElementById('qAnswer').value,
                knowledge: document.getElementById('qKnowledge').value,
                difficulty: parseInt(document.getElementById('qDifficulty').value),
                score: parseInt(document.getElementById('qScore').value)
            };

            try {
                const result = await API.createQuestion(data);
                if (result.code === 200) {
                    hideAddQuestion();
                    loadQuestions();
                    showToast('题目创建成功');
                } else {
                    showToast(result.message, 'error');
                }
            } catch {
                showToast('创建失败', 'error');
            }
        });

        async function viewQuestion(id) {
            const q = allQuestions.find(item => item.id === id);
            if (!q) return;

            document.getElementById('editQuestionId').value = q.id;
            document.getElementById('editText').value = q.question_text;
            document.getElementById('editA').value = q.option_a;
            document.getElementById('editB').value = q.option_b;
            document.getElementById('editC').value = q.option_c;
            document.getElementById('editD').value = q.option_d;
            document.getElementById('editAnswer').value = q.answer;
            document.getElementById('editKnowledge').value = q.knowledge || '';
            document.getElementById('editDifficulty').value = q.difficulty;
            document.getElementById('editScore').value = q.score;

            const options = {A: q.option_a, B: q.option_b, C: q.option_c, D: q.option_d};
            document.getElementById('editOptionsPreview').innerHTML = ['A','B','C','D'].map(key => `
                <div class="option-item ${key === q.answer ? 'correct' : ''}">
                    <strong>${key}.</strong> ${options[key]} ${key === q.answer ? '✓' : ''}
                </div>
            `).join('');

            document.getElementById('detailTitle').textContent = `编辑题目 #${q.id}`;
            openModal('questionDetail');
        }

        document.getElementById('questionEditForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editQuestionId').value;
            const data = {
                question_text: document.getElementById('editText').value,
                option_a: document.getElementById('editA').value,
                option_b: document.getElementById('editB').value,
                option_c: document.getElementById('editC').value,
                option_d: document.getElementById('editD').value,
                answer: document.getElementById('editAnswer').value,
                knowledge: document.getElementById('editKnowledge').value,
                difficulty: parseInt(document.getElementById('editDifficulty').value),
                score: parseInt(document.getElementById('editScore').value)
            };

            try {
                const result = await API.updateQuestion(id, data);
                if (result.code === 200) {
                    closeModal('questionDetail');
                    loadQuestions();
                    showToast('保存成功');
                } else {
                    showToast(result.message || '保存失败', 'error');
                }
            } catch {
                showToast('保存失败', 'error');
            }
        });

        async function deleteQuestion(id) {
            if (!confirm('确定删除这道题目吗？')) return;
            try {
                const result = await API.deleteQuestion(id);
                if (result.code === 200) {
                    loadQuestions();
                    showToast('删除成功');
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch {
                showToast('删除失败', 'error');
            }
        }

        // Exams
        async function loadExams() {
            try {
                const result = await API.getExamsManage();
                if (result.code === 200) {
                    renderExams(result.data);
                }
            } catch {
                document.getElementById('examManageContent').innerHTML = '<div class="error-msg">加载失败</div>';
            }
        }

        function renderExams(exams) {
            if (exams.length === 0) {
                document.getElementById('examManageContent').innerHTML = '<div class="empty-state">暂无考试，点击上方按钮创建</div>';
                return;
            }

            // 缓存考试数据供按钮使用
            window._examsData = exams;

            document.getElementById('examManageContent').innerHTML = exams.map((item, index) => {
                const e = item.exam;
                const total = item.completed_count + item.in_progress_count;
                const safeName = e.exam_name.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                return `
                    <div class="exam-card">
                        <div class="exam-card-header">
                            <div>
                                <h4>${safeName}</h4>
                                <div class="exam-meta">
                                    ${item.question_count} 题 · ${e.total_score} 分 · ${e.duration_minutes} 分钟
                                    ${e.shuffle_enabled ? ' · 🔀 乱序' : ''}
                                </div>
                            </div>
                            <div class="exam-stats">
                                <span class="stat-mini">${total} 人参加</span>
                                <span class="stat-mini">${item.completed_count} 人完成</span>
                            </div>
                        </div>
                        ${item.participants.length > 0 ? `
                            <div class="exam-participants">
                                ${item.participants.sort((a,b) => b.score - a.score).slice(0, 5).map((p, i) => {
                                    const rate = p.total_score > 0 ? (p.score / p.total_score * 100).toFixed(0) : 0;
                                    return `
                                        <div class="participant">
                                            <span class="participant-rank">${i + 1}</span>
                                            <span class="participant-name">${p.username}</span>
                                            <span class="participant-score ${rate >= 60 ? 'pass' : 'fail'}">${p.score}/${p.total_score}</span>
                                        </div>
                                    `;
                                }).join('')}
                                ${item.participants.length > 5 ? `<div class="more-hint">还有 ${item.participants.length - 5} 人...</div>` : ''}
                            </div>
                        ` : '<div class="exam-empty">暂无人参加</div>'}
                        <div class="exam-actions">
                            <button class="btn btn-sm btn-ghost" onclick="handleViewExamQuestions(${index})">查看题目</button>
                            <button class="btn btn-sm btn-danger" onclick="handleDeleteExam(${index})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleViewExamQuestions(index) {
            const item = window._examsData[index];
            if (item && item.exam) {
                viewExamQuestions(item.exam.id, item.exam.exam_name);
            }
        }

        function handleDeleteExam(index) {
            const item = window._examsData[index];
            if (item && item.exam) {
                deleteExam(item.exam.id, item.exam.exam_name);
            }
        }

        function showCreateExam() {
            document.getElementById('createExamCard').style.display = 'block';
            loadQuestionsForSelect();
        }

        function hideCreateExam() {
            document.getElementById('createExamCard').style.display = 'none';
            document.getElementById('examForm').reset();
            selectedQuestions = [];
        }

        async function loadQuestionsForSelect() {
            try {
                const result = await API.getQuestions(1, 1000);
                if (result.code === 200) {
                    selectedQuestions = [];
                    allQuestions = result.data.questions;
                    document.getElementById('questionSelectList').innerHTML = allQuestions.map(q => `
                        <div class="select-item-wrap">
                            <label class="select-item">
                                <input type="checkbox" value="${q.id}" onchange="toggleQuestion(${q.id}, ${q.score})">
                                <span class="select-text">${truncate(q.question_text, 50)}</span>
                                <span class="select-meta">${q.knowledge || '未分类'} · ${q.score}分</span>
                                <button type="button" class="btn-preview" onclick="event.preventDefault(); togglePreview(${q.id})">预览</button>
                            </label>
                            <div class="preview-panel" id="preview-${q.id}">
                                <div class="preview-question">${q.question_text}</div>
                                <div class="preview-options">
                                    ${['A','B','C','D'].map(opt => `
                                        <div class="preview-option ${opt === q.answer ? 'correct' : ''}">
                                            <strong>${opt}.</strong> ${q['option_' + opt.toLowerCase()]}
                                            ${opt === q.answer ? '<span class="correct-mark">✓ 正确答案</span>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="preview-meta">
                                    <span>难度: ${['','简单','中等','困难'][q.difficulty]}</span>
                                    <span>知识点: ${q.knowledge || '未分类'}</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch {
                document.getElementById('questionSelectList').innerHTML = '<div class="error-msg">加载失败</div>';
            }
        }

        function togglePreview(id) {
            const panel = document.getElementById(`preview-${id}`);
            const isOpen = panel.classList.contains('show');
            // 关闭其他预览
            document.querySelectorAll('.preview-panel.show').forEach(p => p.classList.remove('show'));
            if (!isOpen) panel.classList.add('show');
        }

        function toggleQuestion(id, score) {
            const idx = selectedQuestions.indexOf(id);
            if (idx === -1) selectedQuestions.push(id);
            else selectedQuestions.splice(idx, 1);

            document.getElementById('selectedCount').textContent = selectedQuestions.length;
            document.getElementById('selectedScore').textContent = selectedQuestions.length * score;
        }

        document.getElementById('examForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selectedQuestions.length === 0) {
                showToast('请至少选择一道题目', 'error');
                return;
            }

            const data = {
                exam_name: document.getElementById('eName').value,
                duration_minutes: parseInt(document.getElementById('eDuration').value),
                question_ids: selectedQuestions,
                shuffle_enabled: document.getElementById('eShuffle').checked ? 1 : 0
            };

            try {
                const result = await API.createExam(data.exam_name, data.duration_minutes, data.question_ids, data.shuffle_enabled);
                if (result.code === 200) {
                    hideCreateExam();
                    loadExams();
                    showToast('考试创建成功');
                } else {
                    showToast(result.message || '创建失败', 'error');
                }
            } catch {
                showToast('创建失败', 'error');
            }
        });

        async function viewExamQuestions(examId, examName) {
            document.getElementById('examQuestionsTitle').textContent = `${examName} - 题目`;
            document.getElementById('examQuestionsContent').innerHTML = '<div class="loading">加载中...</div>';
            openModal('examQuestions');

            try {
                const result = await API.getExamDetail(examId);
                console.log('Exam detail result:', result);

                if (result.code === 200 && result.data && result.data.questions) {
                    const questions = result.data.questions;
                    if (questions.length === 0) {
                        document.getElementById('examQuestionsContent').innerHTML = '<div class="empty-state">暂无题目</div>';
                        return;
                    }

                    document.getElementById('examQuestionsContent').innerHTML = questions.map((q, i) => `
                        <div class="question-card">
                            <div class="question-num">${i + 1}</div>
                            <div class="question-body">
                                <div class="question-text">${q.question_text || ''}</div>
                                <div class="question-options">
                                    ${['A','B','C','D'].map(key => `
                                        <div class="option ${key === q.answer ? 'correct' : ''}">
                                            <strong>${key}.</strong> ${q['option_' + key.toLowerCase()] || ''}
                                            ${key === q.answer ? '<span class="correct-mark">✓</span>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="question-meta">
                                    <span class="badge ${['','easy','medium','hard'][q.difficulty] || ''}">${['','简单','中等','困难'][q.difficulty] || '未知'}</span>
                                    <span>${q.knowledge || '未分类'}</span>
                                    <span>${q.score || 0}分</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('examQuestionsContent').innerHTML = `<div class="error-msg">${result.message || '加载失败'}</div>`;
                }
            } catch (err) {
                console.error('viewExamQuestions error:', err);
                document.getElementById('examQuestionsContent').innerHTML = '<div class="error-msg">加载失败，请查看控制台</div>';
            }
        }

        async function deleteExam(id, name) {
            if (!confirm(`确定删除考试"${name}"吗？所有相关记录将一并删除。`)) return;
            try {
                const result = await API.deleteExam(id);
                if (result.code === 200) {
                    loadExams();
                    showToast('删除成功');
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch {
                showToast('删除失败', 'error');
            }
        }

        // Students
        async function loadStudents() {
            try {
                const result = await API.getStudents();
                if (result.code === 200) {
                    renderStudents(result.data);
                }
            } catch {
                document.getElementById('studentList').innerHTML = '<div class="error-msg">加载失败</div>';
            }
        }

        function renderStudents(students) {
            if (students.length === 0) {
                document.getElementById('studentList').innerHTML = '<div class="empty-state">暂无学生</div>';
                return;
            }

            document.getElementById('studentList').innerHTML = students.map(s => `
                <div class="student-row">
                    <div class="student-avatar">👤</div>
                    <div class="student-info">
                        <div class="student-name">${s.username}</div>
                        <div class="student-meta">注册: ${s.create_time || '未知'} · 已考 ${s.exam_count} 场</div>
                    </div>
                    <button class="btn btn-sm btn-ghost" onclick="viewStudentRecords(${s.id}, '${s.username.replace(/'/g, "\\'")}')">考试记录</button>
                </div>
            `).join('');
        }

        function filterStudents() {
            const search = document.getElementById('studentSearch').value.toLowerCase();
            const rows = document.querySelectorAll('.student-row');
            rows.forEach(row => {
                const name = row.querySelector('.student-name').textContent.toLowerCase();
                row.style.display = name.includes(search) ? '' : 'none';
            });
        }

        async function viewStudentRecords(studentId, studentName) {
            document.getElementById('studentRecordsTitle').textContent = `${studentName} 的考试记录`;
            document.getElementById('studentRecordsContent').innerHTML = '<div class="loading">加载中...</div>';
            openModal('studentRecords');

            try {
                const result = await API.getExamRecords(studentId);
                if (result.code === 200 && result.data.length > 0) {
                    document.getElementById('studentRecordsContent').innerHTML = result.data.map(item => {
                        const r = item.record;
                        const rate = r.total_score > 0 ? (r.score / r.total_score * 100).toFixed(0) : 0;
                        const pass = rate >= 60;
                        return `
                            <div class="record-row">
                                <div class="record-info">
                                    <div class="record-name">${item.exam_name}</div>
                                    <div class="record-time">${r.end_time || '进行中'}</div>
                                </div>
                                <div class="record-result">
                                    <div class="record-score ${pass ? 'pass' : 'fail'}">${r.score}/${r.total_score}</div>
                                    <div class="record-rate ${pass ? 'pass' : 'fail'}">${rate}%</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    document.getElementById('studentRecordsContent').innerHTML = '<div class="empty-state">暂无考试记录</div>';
                }
            } catch {
                document.getElementById('studentRecordsContent').innerHTML = '<div class="error-msg">加载失败</div>';
            }
        }

        // AI Generate
        document.getElementById('aiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultCard = document.getElementById('aiResult');
            const content = document.getElementById('aiResultContent');
            resultCard.style.display = 'block';

            const count = parseInt(document.getElementById('aiCount').value);
            const steps = [
                '正在连接 AI 服务...',
                '正在分析知识点...',
                `正在生成 ${count} 道题目...`,
                '正在整理生成结果...'
            ];

            // 渲染进度条
            content.innerHTML = `
                <div class="ai-progress-wrap">
                    <div class="ai-progress-label">
                        <span id="aiProgressText">${steps[0]}</span>
                        <span id="aiProgressPct">0%</span>
                    </div>
                    <div class="ai-progress-bar"><div class="fill" id="aiProgressFill"></div></div>
                    <div class="ai-progress-steps" id="aiProgressSteps"></div>
                </div>
            `;

            const fillEl = document.getElementById('aiProgressFill');
            const pctEl = document.getElementById('aiProgressPct');
            const textEl = document.getElementById('aiProgressText');
            const stepsEl = document.getElementById('aiProgressSteps');

            // 模拟进度
            const stageTargets = [20, 45, 75, 92];
            let currentStage = 0;
            let progress = 0;

            const timer = setInterval(() => {
                if (currentStage >= stageTargets.length) return;
                const target = stageTargets[currentStage];
                if (progress < target) {
                    progress += Math.random() * 3 + 1;
                    if (progress > target) progress = target;
                    fillEl.style.width = progress + '%';
                    pctEl.textContent = Math.round(progress) + '%';
                } else {
                    // 进入下一阶段
                    stepsEl.innerHTML += `<span class="done">✓ ${steps[currentStage]}</span>`;
                    currentStage++;
                    if (currentStage < steps.length) {
                        textEl.textContent = steps[currentStage];
                        stepsEl.innerHTML += `<span class="active">▸ ${steps[currentStage]}</span>`;
                    }
                }
            }, 300);

            // 立即显示第一步
            stepsEl.innerHTML = `<span class="active">▸ ${steps[0]}</span>`;

            const data = {
                knowledge: document.getElementById('aiKnowledge').value,
                difficulty: parseInt(document.getElementById('aiDifficulty').value),
                count: count
            };

            try {
                const result = await API.aiGenerateQuestions(data.knowledge, data.difficulty, data.count);
                clearInterval(timer);

                if (result.code === 200) {
                    fillEl.style.width = '100%';
                    pctEl.textContent = '100%';
                    textEl.textContent = '生成完成';
                    stepsEl.innerHTML += `<span class="done">✓ ${steps[currentStage] || steps[steps.length - 1]}</span>`;

                    const questions = result.data;
                    // 缓存生成的题目
                    window._aiGeneratedQuestions = questions;

                    setTimeout(() => {
                        content.innerHTML = `
                            <div class="ai-progress-wrap">
                                <div class="ai-progress-label">
                                    <span>生成完成</span>
                                    <span>100%</span>
                                </div>
                                <div class="ai-progress-bar"><div class="fill" style="width:100%"></div></div>
                            </div>
                            <div class="ai-success">成功生成 ${questions.length} 道题目！已自动加入题库。</div>
                            <div class="ai-list">
                                ${questions.map(q => `
                                    <div class="ai-item">
                                        <div class="ai-text">${truncate(q.question_text, 60)}</div>
                                        <div class="ai-meta">${q.knowledge || '未分类'} · ${q.score}分</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="ai-actions">
                                <button class="btn btn-secondary" onclick="loadQuestions()">刷新题库</button>
                                <button class="btn btn-primary" onclick="switchPanel('exams');showCreateExam()">创建考试</button>
                            </div>
                        `;
                    }, 600);
                    showToast(`成功生成 ${questions.length} 道题目`);
                } else {
                    content.innerHTML = `<div class="error-msg">${result.message}</div>`;
                }
            } catch {
                clearInterval(timer);
                content.innerHTML = '<div class="error-msg">AI 生成失败，请检查配置</div>';
            }
        });

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Helpers
        function truncate(str, len) {
            return str.length > len ? str.slice(0, len) + '...' : str;
        }

        // Init
        checkAiStatus();
        loadOverview();
    </script>
</body>
</html>
