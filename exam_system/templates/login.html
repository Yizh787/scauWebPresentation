<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 四川农业大学考试系统</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <img src="../static/images/logo.png" alt="四川农业大学校徽">
                <h1>在线考试系统</h1>
                <div class="school-name">四川农业大学</div>
                <p>登录您的账户</p>
            </div>

            <div class="error-msg"></div>
            <div class="success-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入学号或手机号" required>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>

                <button type="submit" class="btn" id="submitBtn">登 录</button>
            </form>

            <div class="link">
                还没有账户？<a href="/register">立即注册</a>
            </div>
        </div>
    </div>

    <div class="footer-text">
        © 2024 四川农业大学 教务处
    </div>

    <script src="../static/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideMsg();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const result = await API.login(username, password);

                if (result.code === 200) {
                    showSuccess('登录成功！');
                    Auth.saveUser(result.data);

                    setTimeout(() => {
                        if (result.data.role === 1) {
                            window.location.href = 'admin/admin_dashboard.html';
                        } else {
                            window.location.href = 'student/student_dashboard.html';
                        }
                    }, 500);
                } else {
                    showError(result.message || '登录失败');
                }
            } catch (err) {
                showError('网络错误，请检查后端服务是否启动');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
